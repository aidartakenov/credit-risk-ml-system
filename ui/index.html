<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Кредитный скоринг</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🏦 Оценка кредитного рейтинга</h1>
        <form id="prediction-form">
            <label>Возраст:
                <input type="number" name="Age" required placeholder="Например: 35">
            </label>

            <label>Годовой доход ($):
                <input type="number" name="Annual_Income" step="0.01" required placeholder="Например: 50000">
            </label>

            <label> Ежемесячная зарплата ($):
                <input type="number" name="Monthly_Inhand_Salary" step="0.01" required placeholder="Например: 4000">
            </label>

            <label>Количество кредитов:
                <input type="number" name="Num_of_Loan" required placeholder="Например: 2">
            </label>

            <label>Ежемесячный платеж по кредитам ($):
                <input type="number" name="Total_EMI_per_month" step="0.01" required placeholder="Например: 500">
            </label>

            <label>Профессия:
                <select name="Occupation" required>
                    <option value="">Выберите профессию</option>
                    <option value="Architect">Архитектор</option>
                    <option value="Developer">Разработчик</option>
                    <option value="Doctor">Врач</option>
                    <option value="Engineer">Инженер</option>
                    <option value="Entrepreneur">Предприниматель</option>
                    <option value="Journalist">Журналист</option>
                    <option value="Lawyer">Юрист</option>
                    <option value="Manager">Менеджер</option>
                    <option value="Mechanic">Механик</option>
                    <option value="Media_Manager">Медиа-менеджер</option>
                    <option value="Musician">Музыкант</option>
                    <option value="Scientist">Ученый</option>
                    <option value="Teacher">Учитель</option>
                    <option value="Writer">Писатель</option>
                </select>
            </label>

            <label>Кредитный микс:
                <select name="Credit_Mix" required>
                    <option value="">Выберите тип</option>
                    <option value="Good">Хороший (разные виды кредитов)</option>
                    <option value="Standard">Стандартный</option>
                    <option value="Bad">Плохой (только микрозаймы)</option>
                </select>
            </label>

            <label>Минимальный платеж:
                <select name="Payment_of_Min_Amount" required>
                    <option value="">Выберите вариант</option>
                    <option value="No">Плачу больше минимума</option>
                    <option value="Yes">Только минимальный платеж</option>
                </select>
            </label>

            <label>Поведение при оплате:
                <select name="Payment_Behaviour" required>
                    <option value="">Выберите тип поведения</option>
                    <option value="High_spent_Large_value_payments">Много трачу, большие платежи</option>
                    <option value="High_spent_Medium_value_payments">Много трачу, средние платежи</option>
                    <option value="High_spent_Small_value_payments">Много трачу, маленькие платежи</option>
                    <option value="Low_spent_Large_value_payments">Мало трачу, большие платежи</option>
                    <option value="Low_spent_Medium_value_payments">Мало трачу, средние платежи</option>
                    <option value="Low_spent_Small_value_payments">Мало трачу, маленькие платежи</option>
                </select>
            </label>

            <button type="submit">🔍 Получить решение</button>
        </form>

        <div id="result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
