<!-- ui/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Credit Score Prediction</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Credit Score Prediction</h1>
        <form id="prediction-form">
            <label>Age: <input type="number" name="Age" required></label>
            <label>Annual Income: <input type="number" name="Annual_Income" step="0.01" required></label>
            <label>Monthly Salary: <input type="number" name="Monthly_Inhand_Salary" step="0.01" required></label>
            <label>Number of Loans: <input type="number" name="Num_of_Loan" required></label>
            <label>Total EMI per month: <input type="number" name="Total_EMI_per_month" step="0.01" required></label>

            <label>Occupation:
                <select name="Occupation">
                    <option value="Engineer">Engineer</option>
                    <option value="Doctor">Doctor</option>
                    <option value="Teacher">Teacher</option>
                    <option value="Developer">Developer</option>
                    <option value="Scientist">Scientist</option>
                </select>
            </label>

            <label>Credit Mix:
                <select name="Credit_Mix">
                    <option value="Good">Good</option>
                    <option value="Standard">Standard</option>
                    <option value="Bad">Bad</option>
                </select>
            </label>

            <label>Payment of Min Amount:
                <select name="Payment_of_Min_Amount">
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </label>

            <label>Payment Behaviour:
                <select name="Payment_Behaviour">
                    <option value="High_spent_Medium_value_payments">High spent Medium value payments</option>
                    <option value="Low_spent_Small_value_payments">Low spent Small value payments</option>
                    <option value="High_spent_Small_value_payments">High spent Small value payments</option>
                    <option value="Low_spent_Medium_value_payments">Low spent Medium value payments</option>
                    <option value="High_spent_Large_value_payments">High spent Large value payments</option>
                    <option value="Low_spent_Large_value_payments">Low spent Large value payments</option>
                </select>
            </label>

            <button type="submit">Predict Credit Score</button>
        </form>

        <div id="result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
